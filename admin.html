<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  background: #0d1f3c;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

#login, #panel {
  background: #152848;
  padding: 30px;
  border-radius: 10px;
  width: 90%;
  max-width: 700px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #0d1f3c;
  border: 1px solid #333;
  color: white;
}

button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  background: gold;
  border: none;
  cursor: pointer;
}

textarea {
  height: 300px;
}
</style>
</head>

<body>

<div id="login">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter password">
  <button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">
  <h2>Admin Panel</h2>

  <select id="file">
    <option value="events">Events Data</option>
    <option value="menu">Menu Data</option>
  </select>

  <textarea id="editor"></textarea>

  <button onclick="loadData()">Load</button>
  <button onclick="saveData()">Save</button>
</div>

<script>
let adminPassword = "";
let currentSHA = "";

function login() {
  adminPassword = document.getElementById("password").value;

  if (!adminPassword) {
    alert("Enter password");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("panel").style.display = "block";
}

async function loadData() {
  const file = document.getElementById("file").value;

  const res = await fetch(`/.netlify/functions/get-data?file=${file}`, {
    headers: {
      "x-admin-password": adminPassword
    }
  });

  const data = await res.json();

  document.getElementById("editor").value = JSON.stringify(data.content, null, 2);
  currentSHA = data.sha;
}

async function saveData() {
  const file = document.getElementById("file").value;
  const content = JSON.parse(document.getElementById("editor").value);

  await fetch(`/.netlify/functions/update-data`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-admin-password": adminPassword
    },
    body: JSON.stringify({
      file,
      content,
      sha: currentSHA
    })
  });

  alert("Saved ✅ (site will update in few seconds)");
}
</script>

</body>
</html>
